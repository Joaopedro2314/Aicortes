

# Roda automaticamente sempre que você enviar (push) código para o repositório,
# e também permite rodar manualmente pela aba "Actions" no site do GitHub.
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Dar permissão de execução ao gradlew
        run: chmod +x ./gradlew || true

      - name: Gerar Gradle Wrapper (caso não exista)
        run: gradle wrapper --gradle-version 8.6 || true

      - name: Compilar APK de debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Publicar o APK gerado
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
